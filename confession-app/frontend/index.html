<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#ffffff">
    <title>Confessions</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="app-container">
        <!-- Header -->
        <header class="sticky top-0 z-40 bg-white/80 backdrop-blur-md px-6 pt-10 pb-4 border-b border-gray-100">
            <div class="flex justify-between items-center mb-1">
                <div class="flex items-center gap-3">
                    <div class="w-10 h-10 bg-blue-600 rounded-xl flex items-center justify-center shadow-lg shadow-blue-100">
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path>
                        </svg>
                    </div>
                    <h1 class="text-2xl font-bold tracking-tight text-gray-900">Confessions</h1>
                </div>
                <div class="flex items-center gap-2">
                    <button id="revealToggleBtn" onclick="toggleRevealSetting()" class="px-3 py-1.5 rounded-full border border-gray-100 bg-white shadow-sm text-[9px] font-bold text-gray-500 transition-transform active:scale-95 select-none">👁️ Blur: ON</button>
                    <button id="themeToggleBtn" onclick="cycleTheme()" class="w-8 h-8 rounded-full border border-gray-100 flex items-center justify-center bg-white shadow-sm text-xs transition-transform active:scale-90 select-none">⚙️</button>
                    <div class="w-8 h-8 rounded-full border-2 border-white bg-blue-50 flex items-center justify-center text-[10px] font-bold text-blue-600">99+</div>
                </div>
            </div>
            <p id="quote" class="text-[11px] text-gray-400 font-medium italic transition-opacity duration-500">Some thoughts are meant to be felt...</p>
        </header>

        <!-- Main Feed -->
        <main class="flex-1 px-4 py-6 space-y-6 pb-32">
            <div class="flex gap-2 overflow-x-auto no-scrollbar pb-1">
                <button class="category-btn px-5 py-2 rounded-full bg-black text-white text-xs font-bold shrink-0" data-filter="">Recent</button>
                <button class="category-btn px-5 py-2 rounded-full bg-white text-gray-500 text-xs font-bold border border-gray-100 shrink-0" data-filter="trending">🔥 Trending</button>
                <button class="category-btn px-5 py-2 rounded-full bg-white text-gray-500 text-xs font-bold border border-gray-100 shrink-0" data-filter="deep">🧠 Deep</button>
                <button class="category-btn px-5 py-2 rounded-full bg-white text-gray-500 text-xs font-bold border border-gray-100 shrink-0" data-filter="secret">🤫 Secret</button>
                <button class="category-btn px-5 py-2 rounded-full bg-white text-gray-500 text-xs font-bold border border-gray-100 shrink-0" data-filter="funny">😂 Funny</button>
            </div>

            <div id="feed" class="space-y-5"></div>
        </main>

        <!-- FAB -->
        <button onclick="toggleDrawer('composeModal', true)" class="fab-pulse fixed bottom-24 right-6 w-14 h-14 bg-blue-600 text-white rounded-2xl flex items-center justify-center shadow-lg shadow-blue-200 z-50 active:scale-90 transition-transform">
            <svg width="24" height="24" fill="none" stroke="currentColor" stroke-width="3" viewBox="0 0 24 24"><path d="M12 5v14M5 12h14" stroke-linecap="round"/></svg>
        </button>

        <!-- Bottom Nav -->
        <nav class="fixed bottom-0 left-0 right-0 max-w-[430px] mx-auto flex justify-around items-center h-20 z-40 bg-white/80 backdrop-blur-xl border-t border-gray-100 px-6 pb-4">
            <a href="index.html" class="flex flex-col items-center gap-1 text-blue-600">
                <svg width="22" height="22" fill="currentColor" viewBox="0 0 24 24"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8h5z"/></svg>
                <span class="text-[9px] font-black">HOME</span>
            </a>
            <a href="explore.html" class="flex flex-col items-center gap-1 text-gray-400">
                <svg width="22" height="22" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
                <span class="text-[9px] font-black">EXPLORE</span>
            </a>
            <a href="hearts.html" class="flex flex-col items-center gap-1 text-gray-400">
                <svg width="22" height="22" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M20.8 4.6a5.5 5.5 0 0 0-7.7 0l-1.1 1-1-1a5.5 5.5 0 0 0-7.8 7.8l1.1 1 8.7 8.7 8.8-8.7 1-1a5.5 5.5 0 0 0 0-7.8z"/></svg>
                <span class="text-[9px] font-black">HEARTS</span>
            </a>
        </nav>

        <!-- Create Post Modal -->
        <div id="composeModal" class="drawer">
            <div class="drawer-overlay" onclick="toggleDrawer('composeModal', false)"></div>
            <div class="drawer-content p-8">
                <div class="w-12 h-1.5 bg-gray-200 rounded-full mx-auto mb-8"></div>
                <h2 class="text-2xl font-bold mb-6">Speak your heart</h2>
                <textarea id="confessionInput" placeholder="Be honest..." class="min-h-[200px] w-full text-xl font-medium outline-none resize-none placeholder:text-gray-200"></textarea>
                <div class="flex justify-between items-center pt-4">
                    <div class="flex gap-2 text-gray-300">
                        <button onclick="appendHashtag()" class="p-2 hover:bg-gray-50 rounded-lg transition-colors">#</button>
                        <button onclick="appendHeart()" class="p-2 hover:bg-gray-50 rounded-lg transition-colors">❤</button>
                        <button onclick="document.getElementById('imageInput').click()" class="p-2 hover:bg-gray-50 rounded-lg transition-colors">
                            <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4m4-5l5-5 5 5m-5-5v12"/></svg>
                        </button>
                        <input type="file" id="imageInput" accept="image/*" class="hidden" onchange="window.handleImageSelect(event)">
                    </div>
                    <div id="imagePreview" class="hidden mb-4 relative">
                        <img id="previewImg" src="" class="w-full h-32 object-cover rounded-xl border border-gray-100">
                        <button onclick="window.clearImage()" class="absolute -top-2 -right-2 bg-red-500 text-white rounded-full p-1 shadow-lg">✕</button>
                    </div>
                    <button onclick="addPost()" id="postBtn" disabled class="px-8 py-3 bg-blue-600 text-white rounded-2xl font-bold disabled:opacity-30">Post</button>
                </div>
            </div>
        </div>

        <!-- Comment Drawer -->
        <div id="commentDrawer" class="drawer">
            <div class="drawer-overlay" onclick="toggleDrawer('commentDrawer', false)"></div>
            <div class="drawer-content p-6">
                <div class="w-12 h-1.5 bg-gray-200 rounded-full mx-auto mb-6"></div>
                <div class="flex justify-between items-center mb-2">
                    <h3 class="font-bold text-lg">Comments</h3>
                    <div class="flex gap-2 items-center">
                        <div class="flex bg-gray-100 p-1 rounded-lg">
                            <button id="sortTopBtn" onclick="setCommentSort('top')" class="px-3 py-1 text-xs font-bold bg-white text-gray-900 shadow-sm rounded-md transition-all">Top</button>
                            <button id="sortNewestBtn" onclick="setCommentSort('newest')" class="px-3 py-1 text-xs font-bold text-gray-500 rounded-md transition-all">New</button>
                        </div>
                        <button onclick="toggleDrawer('commentDrawer', false)" class="text-gray-400 p-2">
                            <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M18 6L6 18M6 6l12 12"/></svg>
                        </button>
                    </div>
                </div>
                <div id="commentList" class="flex-1 overflow-y-auto no-scrollbar space-y-2"></div>
                <div class="pt-4 border-t border-gray-100 flex gap-3 items-center">
                    <input type="text" id="commentInput" placeholder="Add a comment..." class="flex-1 bg-gray-50 border-none rounded-2xl px-4 py-3 text-sm outline-none focus:ring-2 focus:ring-blue-100">
                    <button onclick="submitComment()" class="text-blue-600 font-bold px-2">Post</button>
                </div>
            </div>
        </div>
    </div>
    
    <script src="js/api.js"></script>
    <script src="js/script.js"></script>
</body>
</html>
