<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#ffffff">
    <title>Activity</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="app-container">
        <!-- Header -->
        <header class="sticky top-0 z-40 bg-white/80 backdrop-blur-md px-6 pt-10 pb-4 border-b border-gray-100 flex items-center justify-between">
            <h1 class="text-2xl font-bold tracking-tight text-gray-900">Activity</h1>
        </header>

        <!-- Activity Feed -->
        <main class="flex-1 px-4 py-4 space-y-4 pb-32">
            <div class="flex items-center gap-4 py-3 border-b border-gray-50">
                <div class="w-10 h-10 rounded-full bg-red-50 flex items-center justify-center text-red-500 shrink-0">
                    <svg width="20" height="20" fill="currentColor" viewBox="0 0 24 24"><path d="M20.8 4.6a5.5 5.5 0 0 0-7.7 0l-1.1 1-1-1a5.5 5.5 0 0 0-7.8 7.8l1.1 1 8.7 8.7 8.8-8.7 1-1a5.5 5.5 0 0 0 0-7.8z"/></svg>
                </div>
                <div>
                    <p class="text-sm text-gray-800">Someone liked your confession.</p>
                    <p class="text-xs text-gray-400 font-medium">2 hours ago</p>
                </div>
            </div>

            <div class="flex items-center gap-4 py-3 border-b border-gray-50">
                <div class="w-10 h-10 rounded-full bg-blue-50 flex items-center justify-center text-blue-500 shrink-0">
                    <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z"/></svg>
                </div>
                <div>
                    <p class="text-sm text-gray-800">Someone commented on your post.</p>
                    <p class="text-xs text-gray-400 font-medium">Yesterday</p>
                </div>
            </div>
        </main>

        <!-- Bottom Nav -->
        <nav class="fixed bottom-0 left-0 right-0 max-w-[430px] mx-auto flex justify-around items-center h-20 z-40 bg-white/80 backdrop-blur-xl border-t border-gray-100 px-6 pb-4">
            <a href="index.html" class="flex flex-col items-center gap-1 text-gray-400">
                <svg width="22" height="22" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
                <span class="text-[9px] font-black">HOME</span>
            </a>
            <a href="explore.html" class="flex flex-col items-center gap-1 text-gray-400">
                <svg width="22" height="22" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
                <span class="text-[9px] font-black">EXPLORE</span>
            </a>
            <a href="hearts.html" class="flex flex-col items-center gap-1 text-red-500">
                <svg width="22" height="22" fill="currentColor" viewBox="0 0 24 24"><path d="M20.8 4.6a5.5 5.5 0 0 0-7.7 0l-1.1 1-1-1a5.5 5.5 0 0 0-7.8 7.8l1.1 1 8.7 8.7 8.8-8.7 1-1a5.5 5.5 0 0 0 0-7.8z"/></svg>
                <span class="text-[9px] font-black">HEARTS</span>
            </a>
        </nav>
    </div>
</body>
</html>
